<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bookGradient)"/>
  
  <!-- Open Book -->
  <path d="M120 180 C120 160, 180 150, 256 150 C332 150, 392 160, 392 180 L392 340 C392 320, 332 310, 256 310 C180 310, 120 320, 120 340 Z" fill="#ffffff" opacity="0.95"/>
  
  <!-- Book Spine -->
  <path d="M256 150 L256 310" stroke="#e0e0e0" stroke-width="3"/>
  
  <!-- Left Page Lines -->
  <line x1="140" y1="200" x2="240" y2="200" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="230" x2="240" y2="230" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="260" x2="240" y2="260" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="290" x2="200" y2="290" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right Page Lines -->
  <line x1="272" y1="200" x2="372" y2="200" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="272" y1="230" x2="372" y2="230" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <line x1="272" y1="260" x2="372" y2="260" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Squirrel Tail (stylized as a leaf) -->
  <path d="M360 120 Q440 80 460 140 Q480 200 420 220 Q400 230 380 210 Q400 190 390 160 Q380 130 360 120" fill="url(#leafGradient)" opacity="0.9"/>
  
  <!-- Small acorn decoration -->
  <ellipse cx="150" cy="360" rx="20" ry="25" fill="#d97706"/>
  <path d="M130 340 Q150 330 170 340" stroke="#92400e" stroke-width="4" fill="none"/>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="280" r="8" fill="#fbbf24" opacity="0.8"/>
  <circle cx="420" cy="380" r="6" fill="#fbbf24" opacity="0.6"/>
  <circle cx="400" cy="100" r="5" fill="#fbbf24" opacity="0.7"/>
</svg>